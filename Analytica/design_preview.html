<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytica | Terminal Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: #000;
            overflow: hidden;
            color: white;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.02);
            border-radius: 1.5rem;
        }
        .glow-button {
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
            transition: all 0.3s ease;
        }
        .glow-button:hover {
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.5);
            transform: translateY(-1px);
        }
        input:focus {
            border-color: #F59E0B !important;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }
        .fade-in {
            animation: fadeIn 1s ease-out forwards;
        }
        .slide-up {
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .stagger-1 { animation-delay: 0.2s; }
        .stagger-2 { animation-delay: 0.3s; }
        .stagger-3 { animation-delay: 0.4s; }
        .stagger-4 { animation-delay: 0.5s; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <canvas id="constellation"></canvas>

    <div class="glass-card w-full max-w-sm relative z-10 p-10 flex flex-col gap-8 slide-up">
        <div class="flex flex-col gap-1 fade-in stagger-1">
            <h1 class="text-4xl font-extrabold tracking-tight text-white m-0">Analytica</h1>
            <p class="text-white/50 text-sm font-medium italic">"E pur si muove"</p>
        </div>

        <form class="flex flex-col gap-6" onsubmit="return false;">
            <div class="flex flex-col gap-1.5 fade-in stagger-2">
                <label class="text-[10px] uppercase tracking-widest text-white/40 font-bold px-1">Email</label>
                <input type="email" placeholder="trader@analytica.io" 
                    class="bg-transparent border-b border-white/10 py-2 px-1 text-white placeholder:text-white/20 outline-none transition-colors duration-300">
            </div>

            <div class="flex flex-col gap-1.5 fade-in stagger-3">
                <label class="text-[10px] uppercase tracking-widest text-white/40 font-bold px-1">Password</label>
                <input type="password" placeholder="••••••••" 
                    class="bg-transparent border-b border-white/10 py-2 px-1 text-white placeholder:text-white/20 outline-none transition-colors duration-300">
            </div>

            <button class="mt-4 py-3 px-6 rounded-lg bg-gradient-to-r from-amber-500 to-orange-600 text-black font-bold text-sm tracking-wide glow-button fade-in stagger-4">
                ENTRAR AL TERMINAL
            </button>
        </form>

        <div class="flex justify-between items-center text-[10px] text-white/30 uppercase tracking-widest font-bold fade-in stagger-4">
            <a href="#" class="hover:text-amber-500 transition-colors">Olvidé mi clave</a>
            <a href="#" class="hover:text-amber-500 transition-colors">Solicitar Acceso</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('constellation');
        const ctx = canvas.getContext('2d');
        let nodes = [];
        let mouse = { x: -1000, y: -1000 };

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            nodes = [];
            const nodeCount = Math.floor((canvas.width * canvas.height) / 15000);
            for (let i = 0; i < nodeCount; i++) {
                nodes.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(245, 158, 11, 0.4)";
            ctx.strokeStyle = "rgba(245, 158, 11, 0.1)";

            nodes.forEach((node, i) => {
                node.x += node.vx;
                node.y += node.vy;

                const dx = mouse.x - node.x;
                const dy = mouse.y - node.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 150) {
                    node.x -= dx * 0.01;
                    node.y -= dy * 0.01;
                }

                if (node.x < 0 || node.x > canvas.width) node.vx *= -1;
                if (node.y < 0 || node.y > canvas.height) node.vy *= -1;

                ctx.beginPath();
                ctx.arc(node.x, node.y, 2, 0, Math.PI * 2);
                ctx.fill();

                for (let j = i + 1; j < nodes.length; j++) {
                    const nextNode = nodes[j];
                    const d2 = Math.sqrt((node.x - nextNode.x)**2 + (node.y - nextNode.y)**2);
                    if (d2 < 120) {
                        ctx.beginPath();
                        ctx.moveTo(node.x, node.y);
                        ctx.lineTo(nextNode.x, nextNode.y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
