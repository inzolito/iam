name: Mobile Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=ENV=${{ inputs.environment || 'staging' }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ inputs.environment || 'staging' }}.apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-ios:
    name: Build iOS (no-codesign)
    runs-on: macos-latest

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=ENV=${{ inputs.environment || 'staging' }}

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ inputs.environment || 'staging' }}
          path: apps/mobile/build/ios/iphoneos/Runner.app
          retention-days: 30
